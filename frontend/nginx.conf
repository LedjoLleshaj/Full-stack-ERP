server {
    listen 80;
    server_name selitafish.com www.selitafish.com;

    # Redirect all HTTP traffic to HTTPS (canonical domain)
    return 301 https://selitafish.com$request_uri;
}

# Redirect www to non-www
server {
    listen 443 ssl;
    http2 on;
    server_name www.selitafish.com;

    ssl_certificate /etc/letsencrypt/live/selitafish.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/selitafish.com/privkey.pem;

    return 301 https://selitafish.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name selitafish.com;

    # SSL certificates (correctly pointing to the mounted letsencrypt directory)
    ssl_certificate /etc/letsencrypt/live/selitafish.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/selitafish.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API calls to Django backend
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Serve Angular routes via index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_vary on;

    # Long-term caching for static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg|eot|otf)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
