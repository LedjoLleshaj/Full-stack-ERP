<h2>{{ editId ? 'Modifiko shpenzimin' : 'Shto shpenzim' }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-3 max-w-md">
  <mat-form-field appearance="fill">
    <mat-label>Emri</mat-label>
    <input matInput formControlName="name" />
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Kategoria</mat-label>
    <input matInput formControlName="category" />
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Përshkrimi</mat-label>
    <textarea matInput formControlName="description"></textarea>
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Shuma</mat-label>
    <input matInput type="number" step="0.01" formControlName="amount" />
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Monedha</mat-label>
    <mat-select formControlName="currency">
      <mat-option *ngFor="let c of currencies" [value]="c">{{ c }}</mat-option>
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Llogaria</mat-label>
    <mat-select formControlName="account_type">
      <mat-option *ngFor="let a of accountTypes" [value]="a">{{ a }}</mat-option>
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Frekuenca</mat-label>
    <mat-select formControlName="frequency">
      <mat-option *ngFor="let f of frequencies" [value]="f.value">{{ f.label }}</mat-option>
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Data e fillimit</mat-label>
    <input matInput type="date" formControlName="start_date" />
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Data e mbarimit (opsionale)</mat-label>
    <input matInput type="date" formControlName="end_date" />
  </mat-form-field>
  <mat-checkbox formControlName="auto_charge">Ngarko automatikisht</mat-checkbox>
  <div class="flex gap-2">
    <button mat-raised-button color="primary" type="submit">Ruaj</button>
    <button mat-stroked-button type="button" (click)="cancel()">Anulo</button>
  </div>
</form>
