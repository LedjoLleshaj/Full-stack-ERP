<div class="flex flex-col items-stretch justify-start gap-6">
  <!-- Page Header -->
  <div class="py-2">
    <h1 class="text-3xl font-bold">Grafiku i Fitimit</h1>
    <p class="text-gray-600 dark:text-gray-400 mt-1">
      Fitimi ditor per 30 ditet e fundit (shitje - blerje)
    </p>
  </div>

  <!-- Chart Card -->
  <mat-card class="chart-card" [ngClass]="{'dark-card': isDarkMode}">
    <mat-card-content>
      <!-- Loading Spinner -->
      <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="48"></mat-spinner>
        <p class="text-gray-500 mt-4">Duke ngarkuar te dhenat...</p>
      </div>

      <!-- Chart -->
      <div
        *ngIf="!isLoading"
        echarts
        [options]="chartOptions"
        class="chart-container"
      ></div>
    </mat-card-content>
  </mat-card>

  <!-- Legend -->
  <div class="flex items-center justify-center gap-8 text-sm">
    <div class="flex items-center gap-2">
      <span class="legend-dot bg-green-500"></span>
      <span class="text-gray-600 dark:text-gray-400">Fitim pozitiv</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="legend-dot bg-red-500"></span>
      <span class="text-gray-600 dark:text-gray-400">Humbje</span>
    </div>
  </div>
</div>
