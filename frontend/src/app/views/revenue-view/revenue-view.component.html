<div class="flex flex-col items-stretch justify-start gap-6">
  <!-- Page Header with Period Selector -->
  <div class="flex flex-wrap items-center justify-between gap-4 py-2">
    <div>
      <h1 class="text-3xl font-bold">Grafiku i Shitjeve dhe Blerjeve</h1>
      <p class="text-gray-600 dark:text-gray-400 mt-1">
        Shitje (jeshile) vs Blerje (kuqe) - {{ selectedPeriod.label }}
      </p>
    </div>
    
    <!-- Period Selector -->
    <mat-form-field appearance="outline" class="period-selector">
      <mat-label>Periudha</mat-label>
      <mat-select [value]="selectedPeriod" (selectionChange)="onPeriodChange($event.value)">
        <mat-option *ngFor="let period of periodOptions" [value]="period">
          {{ period.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <!-- Chart Card -->
  <mat-card class="chart-card" [ngClass]="{'dark-card': isDarkMode}">
    <mat-card-content>
      <!-- Loading Spinner -->
      <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="48"></mat-spinner>
        <p class="text-gray-500 mt-4">Duke ngarkuar te dhenat...</p>
      </div>

      <!-- Chart -->
      <div
        *ngIf="!isLoading"
        echarts
        [options]="chartOptions"
        class="chart-container"
      ></div>
    </mat-card-content>
  </mat-card>

  <!-- Legend -->
  <div class="flex items-center justify-center gap-8 text-sm">
    <div class="flex items-center gap-2">
      <span class="legend-dot bg-green-500"></span>
      <span class="text-gray-600 dark:text-gray-400">Shitje (te ardhura)</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="legend-dot bg-red-500"></span>
      <span class="text-gray-600 dark:text-gray-400">Blerje (shpenzime)</span>
    </div>
  </div>
</div>
