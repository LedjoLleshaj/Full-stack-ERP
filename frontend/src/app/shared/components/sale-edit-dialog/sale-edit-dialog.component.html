<h2 mat-dialog-title>Redakto Shitjen</h2>
<mat-dialog-content>
  <!-- Line items table -->
  <table class="edit-items-table">
    <thead>
      <tr>
        <th>Produkti</th>
        <th>Sasia</th>
        <th>Çmimi</th>
        <th>TVSH</th>
        <th>Nëntotali</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of state.items; let i = index; trackBy: trackByIndex">
        <td>
          <mat-form-field>
            <input matInput
                   [(ngModel)]="state.items[i].productSearchText"
                   [matAutocomplete]="productAuto"
                   placeholder="Kërko produkt...">
            <mat-autocomplete #productAuto="matAutocomplete"
                              [displayWith]="displayProduct"
                              (optionSelected)="onProductSelect(i, $event)">
              <mat-option *ngFor="let p of filterProducts(i, state.items[i].productSearchText)" [value]="p">
                {{ p.name }}
              </mat-option>
            </mat-autocomplete>
          </mat-form-field>
        </td>
        <td>
          <mat-form-field class="small-field">
            <input matInput type="number" min="1"
                   [(ngModel)]="state.items[i].quantity"
                   (ngModelChange)="saleFormService.updateItemField(i, 'quantity', $event)">
          </mat-form-field>
        </td>
        <td>
          <mat-form-field class="small-field">
            <input matInput type="number" min="0"
                   [(ngModel)]="state.items[i].price"
                   (ngModelChange)="saleFormService.updateItemField(i, 'price', $event)">
          </mat-form-field>
        </td>
        <td>
          <mat-select [(ngModel)]="state.items[i].taxRateId"
                      (ngModelChange)="saleFormService.updateItemField(i, 'taxRateId', $event)">
            <mat-option [value]="null">—</mat-option>
            <mat-option *ngFor="let tr of state.availableTaxRates" [value]="tr.id">{{ tr.name }}</mat-option>
          </mat-select>
        </td>
        <td>{{ getItemLineTotal(i) | number:'1.2-2' }} {{ state.currency }}</td>
        <td>
          <button mat-icon-button color="warn" (click)="removeItem(i)" [disabled]="state.items.length <= 1">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <button mat-stroked-button (click)="addItem()">
    <mat-icon>add</mat-icon> Shto Produkt
  </button>

  <div class="edit-total">
    <strong>Totali: {{ getGrandTotal() | number:'1.2-2' }} {{ state.currency }}</strong>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Anulo</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="!saleFormService.canCreateSale()">
    Ruaj
  </button>
</mat-dialog-actions>
