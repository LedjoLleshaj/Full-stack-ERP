<button class="close-button" (click)="closeDialog()">
  <mat-icon>close</mat-icon>
</button>

<h3>{{ data.name }}</h3>
<p>Kategoria: {{ data.category }}</p>
<p>Pershkrimi: {{ data.description }}</p>
<p>Cmimi: {{ data.price | currency }}</p>
<div class="dialog-actions">
  <button mat-stroked-button color="primary" (click)="addToCart(data)"><mat-icon>add</mat-icon> Shtoje</button>
  <button mat-raised-button color="accent" (click)="buyProduct(data)">Blej direkt</button>
</div>
