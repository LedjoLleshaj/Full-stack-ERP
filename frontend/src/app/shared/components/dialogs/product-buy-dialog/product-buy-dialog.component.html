<button class="close-button" (click)="closeDialog()">
    <mat-icon>close</mat-icon>
  </button>
  
  <h3>{{ data.name }}</h3>
  <p>Category: {{ data.category }}</p>
  <p>Description: {{ data.description }}</p>
  <p>Price: {{ data.price | currency }}</p>
  <div class="dialog-actions">
    <button mat-stroked-button color="primary" (click)="addToCart(data)">
      <mat-icon>add</mat-icon> Add to Cart
    </button>
    <button mat-raised-button color="accent" (click)="buyProduct(data)">
      Buy Directly
    </button>
  </div>
