<!-- Client Table -->
<div class="pb-16">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
    <!-- Name Column -->
    <ng-container matColumnDef="firstname">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Emri</th>
      <td mat-cell *matCellDef="let client">
        <button mat-button (click)="this.router.navigate(['/client/', client.id])">
          {{ client.firstname }}
        </button>
      </td>
    </ng-container>

    <!-- Mbiemri Column -->
    <ng-container matColumnDef="lastname">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Mbiemri</th>
      <td mat-cell *matCellDef="let client">{{ client.lastname }}</td>
    </ng-container>

    <!-- Phone Column -->
    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nr. Cel</th>
      <td mat-cell *matCellDef="let client">{{ client.phone }}</td>
    </ng-container>

    <!-- Address Column -->
    <ng-container matColumnDef="address">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Adresa</th>
      <td mat-cell *matCellDef="let client">{{ client.address }}</td>
    </ng-container>

    <!-- unpaidBalance Column -->
    <ng-container matColumnDef="unpaidBalance">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Balanca per te paguar</th>
      <td mat-cell *matCellDef="let client">
        <span [ngClass]="client.unpaidBalance <= 0 ? 'text-green' : 'text-red'">{{
          client.unpaidBalance > 0 ? " - " + client.unpaidBalance + " €" : " + " + client.unpaidBalance + " €"
        }}</span>
      </td>
    </ng-container>

    <!-- Table Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  <hr />
  <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
</div>
