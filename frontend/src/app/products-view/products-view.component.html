<div class="flex flex-col items-stretch">
    <mat-form-field *ngIf="products.length" class="sm:w-1/2 md:w-2/5">
      <mat-label>Search by name</mat-label>
      <input matInput placeholder="Search by name" (input)="onSearchNameChange($event)" />
    </mat-form-field>
  
    <div class="pb-16" *ngIf="filteredProducts.length; else elseBlock">
      <table mat-table [dataSource]="filteredProducts" class="mat-elevation-z8">
  
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let product"> {{product.id}} </td>
        </ng-container>
  
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let product"> {{product.name}} </td>
        </ng-container>
  
        <!-- Category Column -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef> Category </th>
          <td mat-cell *matCellDef="let product"> {{product.category}} </td>
        </ng-container>
  
        <!-- Price Column -->
        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef> Price </th>
          <td mat-cell *matCellDef="let product"> {{product.price}} </td>
        </ng-container>
  
        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> Description </th>
          <td mat-cell *matCellDef="let product"> {{product.description}} </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <ng-template #elseBlock>
      <div class="flex justify-center">
        <mat-spinner aria-label="Loading products data"></mat-spinner>
      </div>
    </ng-template>
  </div>
