<div class="flex flex-col items-stretch">
  <!-- Search Input Field -->
  <mat-form-field class="sm:w-1/2 md:w-2/5">
    <mat-label>Search</mat-label>
    <input matInput (input)="applyFilter($event)" placeholder="Search by name">
  </mat-form-field>

  <!-- Category Buttons Row -->
  <div class="category-buttons-row">
    <button 
      mat-button 
      *ngFor="let category of categories" 
      (click)="filterByCategory(category)" 
      [ngClass]="{'active': activeCategory === category}" 
      class="category-button"
    >
      {{ category }}
    </button>
  </div>

  <!-- Product Table -->
  <div class="pb-16">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let product">
          <button mat-button (click)="openProductDetail(product)">
            {{ product.name }}
          </button>
        </td>
      </ng-container>

      <!-- Category Column -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Category </th>
        <td mat-cell *matCellDef="let product"> {{ product.category }} </td>
      </ng-container>

      <!-- Price Column -->
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
        <td mat-cell *matCellDef="let product"> {{ product.price | currency }} </td>
      </ng-container>

      <!-- Description Column -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Description </th>
        <td mat-cell *matCellDef="let product"> {{ product.description }} </td>
      </ng-container>

      <!-- Buy Column -->
      <ng-container matColumnDef="buy">
        <th mat-header-cell *matHeaderCellDef> Buy </th>
        <td mat-cell *matCellDef="let product">
          <button 
            mat-button 
            (click)="buyProductButton(product)" 
            class="category-button"
          >
            Buy
          </button>
        </td>
      </ng-container>

      <!-- Table Rows -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <hr>
    <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
  </div>
</div>
