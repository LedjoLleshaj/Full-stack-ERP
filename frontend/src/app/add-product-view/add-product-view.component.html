<div class="add-product-container">
  <h2>Add New Product</h2>
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="form-grid">
      <!-- Product Name -->
      <mat-form-field class="full-width">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" required>
        <mat-error *ngIf="productForm.controls['name'].hasError('required')">
          Name is required
        </mat-error>
      </mat-form-field>

      <!-- Product Category -->
      <mat-form-field class="full-width">
        <mat-label>Category</mat-label>
        <input matInput formControlName="category" required>
        <mat-error *ngIf="productForm.controls['category'].hasError('required')">
          Category is required
        </mat-error>
      </mat-form-field>

      <!-- Product Price -->
      <mat-form-field class="full-width">
        <mat-label>Price</mat-label>
        <input matInput type="number" formControlName="price" required>
        <mat-error *ngIf="productForm.controls['price'].hasError('required')">
          Price is required
        </mat-error>
        <mat-error *ngIf="productForm.controls['price'].hasError('min')">
          Price must be greater than or equal to 0
        </mat-error>
      </mat-form-field>

      <!-- Product Description -->
      <mat-form-field class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" required></textarea>
        <mat-error *ngIf="productForm.controls['description'].hasError('required')">
          Description is required
        </mat-error>
      </mat-form-field>

      <!-- Submit Button -->
      <div class="button-container">
        <button mat-raised-button color="primary" type="submit" [disabled]="!productForm.valid">Add Product</button>
      </div>
    </div>
  </form>
</div>
