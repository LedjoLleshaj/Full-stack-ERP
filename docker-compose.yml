services:
  db:
    build: ./db
    container_name: selita_fish_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: REDACTED
      POSTGRES_PASSWORD: REDACTED
      POSTGRES_DB: selita_fish
    ports:
      - "5432:5432"
    # volumes:
    #   - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
  backend:
    build:
      context: ./backend
    container_name: selita_fish_backend
    environment:
      DB_HOST: db # Database service name in docker-compose
      DB_PORT: 5432
      DB_NAME: selita_fish
      DB_USER: REDACTED
      DB_PASSWORD: REDACTED
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8080:8080"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selita_fish_frontend
    ports:
      - "4200:4200"
    volumes:
      - /frontend/node_modules
      - ./frontend:/frontend
    depends_on:
      - backend #optional
    restart: unless-stopped
