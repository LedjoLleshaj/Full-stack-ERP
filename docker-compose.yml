services:
  db:
    build: ./db
    container_name: selita_fish
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: selita_fish
    ports:
      - "5432:5432"
    # volumes:
    #   - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
  backend:
    build:
      context: ./backend
    container_name: selita_fish_backend
    environment:
      DB_HOST: db # Database service name in docker-compose
      DB_PORT: 5432
      DB_NAME: selita_fish
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db
    ports:
      - "8080:8080"
