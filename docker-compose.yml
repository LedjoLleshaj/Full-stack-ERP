services:
  db:
    build: ./db
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
    container_name: erp_backend
    environment:
      DB_HOST: db # Database service name in docker-compose
      DB_PORT: 5432
      DB_NAME: erp_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: erp_frontend
    ports:
      - "4200:4200"
    volumes:
      - /frontend/node_modules
      - ./frontend:/frontend
    depends_on:
      - backend

volumes:
  pgdata:
