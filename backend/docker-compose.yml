version: "3.9"

services:
  backend:
    container_name: backend
    build: .
    ports:
      - "8080:8080"
    environment:
      - PG_USER=REDACTED
      - PG_PASSWORD=REDACTED
      - PG_DB=REDACTED
      - PG_HOST=db
      - PG_PORT=5432
    depends_on:
      - db
  db:
    container_name: db
    image: REDACTED:12
    environment:
      - POSTGRES_USER=REDACTED
      - POSTGRES_PASSWORD=REDACTED
      - POSTGRES_DB=REDACTED
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/REDACTEDql/data

volumes:
  pgdata: {}
