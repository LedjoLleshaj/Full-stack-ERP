[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "backend.settings_test"
python_files = "tests.py test_*.py *_tests.py"
python_classes = "Test*"
python_functions = "test_*"
