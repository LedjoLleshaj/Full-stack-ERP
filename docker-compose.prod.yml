services:
  db:
    build: ./db
    container_name: selita_fish_db
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - REDACTED_data:/var/lib/REDACTEDql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - selita_network

  backend:
    build:
      context: ./backend
    container_name: selita_fish_backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/backend/staticfiles
      - ./logs/backend:/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/selita/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - selita_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selita_fish_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./logs/nginx:/var/log/nginx
      # SSL setup with Certbot - Mounting parent directory to handle symbolic links correctly
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - selita_network

volumes:
  REDACTED_data:
  static_files:

networks:
  selita_network:
    driver: bridge
